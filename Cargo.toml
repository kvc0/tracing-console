[workspace]
resolver = "2"
members = ["tracing-console", "tracing-cache"]

[workspace.dependencies]
criterion                       = { version = "0", features = ["async_tokio"] }
k-cache                         = { version = "0" }
log                             = { version = "0.4" }
spillway                        = { version = "1" }
tokio                           = { version = "1", features = ["rt", "rt-multi-thread", "sync", "time", "macros"] }
tracing                         = { version = "0" }
tracing-futures                 = { version = "0.2" }
